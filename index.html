<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Repostaje</title>

<style>
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:#0f172a;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  padding:14px;
  background:#1e293b;
  display:flex;
  gap:10px;
  justify-content:center;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  background:#334155;
  color:white;
  transition:.2s;
}

button.active{
  background:#22c55e;
  color:#0f172a;
}

iframe{
  flex:1;
  border:none;
  width:100%;
  height:100%;
  background:#0f172a;
}


</style>

</head>
<body>

<header>
  <button id="btn1" class="active" onclick="loadApp('Repostajev2.html', this)">
    Llenado del Depósito
  </button>

  <button id="btn2" onclick="loadApp('SimuladorRepostaje.html', this)">
    Simulador de Repostaje
  </button>

  <button id="btn3" class="active" onclick="loadApp('Autonomia.html', this)">
    Autonomía
  </button>

   <button id="btn4" onclick="loadApp('Gasolineras.html', this)">
    Gasolineras cercanas
  </button>

</header>

<iframe id="frame" src="Repostajev2.html"></iframe>

<script>
function loadApp(url, btn){

  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  const frame = document.getElementById("frame");
  frame.src = url;
}
</script>

</body>
</html>
