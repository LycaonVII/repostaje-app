<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Repostaje</title>

<style>
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:#0f172a;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER MEJORADO */
header{
  padding:12px;
  background:#1e293b;

  display:flex;
  gap:10px;
  justify-content:center;

  /* 🔥 mejora clave */
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  white-space:nowrap;
}

/* BOTONES (manteniendo tu estilo base) */
button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  background:#334155;
  color:white;
  transition:.2s;

  /* 🔥 evita que se compriman */
  flex:0 0 auto;
  white-space:nowrap;
}

/* ACTIVO */
button.active{
  background:#22c55e;
  color:#0f172a;
  transform:scale(1.05);
  box-shadow:0 0 12px rgba(34,197,94,0.4);
}

/* efecto hover (opcional pero mejora sensación app) */
button:hover{
  opacity:.9;
}

/* IFRAME */
iframe{
  flex:1;
  border:none;
  width:100%;
  height:100%;
  background:#0f172a;
}


</style>

</head>
<body>

<header>
  <button id="btn1" class="active" onclick="loadApp('Repostajev2.html', this)">
    Llenado del Depósito
  </button>

  <button id="btn2" onclick="loadApp('SimuladorRepostaje.html', this)">
    Simulador de Repostaje
  </button>

  <button id="btn3" onclick="loadApp('Autonomia.html', this)">
    Autonomía
  </button>

   <button id="btn4" onclick="loadApp('Gasolineras.html', this)">
    Gasolineras cercanas
  </button>

</header>

<iframe id="frame" src="Repostajev2.html"></iframe>

<script>
function loadApp(url, btn){

  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  const frame = document.getElementById("frame");
  frame.src = url;
}
</script>

</body>
</html>
